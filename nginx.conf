# nginx.conf — Reverse proxy para o Streamlit
# Coloque este arquivo na raiz do projeto.
# Para HTTPS, gere certificados com Certbot:
#   certbot --nginx -d seudominio.com

upstream streamlit_app {
    server app:8501;
}

# Redireciona HTTP → HTTPS (descomente quando tiver certificado SSL)
# server {
#     listen 80;
#     server_name seudominio.com www.seudominio.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80;
    server_name _;          # troque por seu domínio em produção

    # Tamanho máximo de upload (deve bater com maxUploadSize no config.toml)
    client_max_body_size 50M;

    location / {
        proxy_pass         http://streamlit_app;
        proxy_http_version 1.1;

        # Headers necessários para WebSocket (Streamlit usa WS)
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts generosos para queries longas
        proxy_read_timeout  300s;
        proxy_send_timeout  300s;

        # Cache off para o Streamlit
        proxy_cache_bypass $http_upgrade;
    }

    # Health check do nginx (opcional)
    location /nginx-health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}

